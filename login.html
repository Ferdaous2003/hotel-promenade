<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connexion — Hôtel La Promenade</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">
<div class="auth-wrap">
<div class="auth-card">
<!-- GAUCHE (branding simple) -->
<div class="auth-left">
<div class="brand">
<span class="brand-dot"></span>
<div class="brand-text">
<div class="brand-name">Hôtel La Promenade</div>
<div class="brand-sub">Gestion des événements</div>
</div>
</div>
<h1 class="auth-title">Connexion</h1>
<p class="auth-desc">Accédez à votre espace.</p>
</div>
<!-- DROITE (formulaire clean) -->
<div class="auth-right">
<div class="form-card">
<label class="lbl">Email</label>
<input id="email" class="in" type="email" placeholder="ex: admin@test.com" />
<label class="lbl">Mot de passe</label>
<input id="password" class="in" type="password" placeholder="••••" />
<button id="btnLogin" class="btn-main">Se connecter</button>
<div class="auth-footer">
<a class="help-link" href="#">Besoin d’aide ?</a>
</div>
</div>
</div>
</div>
</div>
<script src="js/app.js"></script>
<script src="js/login.js"></script>
</body>
</html>
