<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Créer un événement</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Créer un événement</h1>

    <p>
      <a href="dashboard.html">⬅ Retour au dashboard</a>
    </p>

    <div id="msg" style="margin: 10px 0;"></div>

    <label>Titre de l’événement</label>
    <input id="title" type="text" placeholder="Ex: Mariage de Sarah" />

    <label>Type</label>
    <select id="type">
      <option value="">-- Choisir --</option>
      <option value="mariage">Mariage</option>
      <option value="reunion">Réunion</option>
      <option value="seminaire">Séminaire</option>
      <option value="conference">Conférence</option>
      <option value="autre">Autre</option>
    </select>

    <label>Description (optionnel)</label>
    <textarea id="description" rows="4" placeholder="Infos supplémentaires..."></textarea>

    <label>Date & heure début</label>
    <input id="start" type="datetime-local" />

    <label>Date & heure fin</label>
    <input id="end" type="datetime-local" />

    <label>Salle souhaitée</label>
    <select id="room">
      <option value="">-- Choisir --</option>
      <option value="Salle A">Salle A</option>
      <option value="Salle B">Salle B</option>
      <option value="Salle C">Salle C</option>
    </select>

    <label>Budget prévisionnel ($)</label>
    <input id="budget" type="number" min="0" step="0.01" placeholder="Ex: 1500" />

    <label>Nombre estimé de participants</label>
    <input id="participants" type="number" min="1" step="1" placeholder="Ex: 80" />

    <label>Services souhaités</label>
    <div class="card" style="padding:14px; margin-top:8px;">
      <label style="margin:0 0 8px 0; font-weight:600;">
        <input type="checkbox" class="service" value="traiteur" /> Traiteur
      </label>
      <label style="margin:0 0 8px 0; font-weight:600;">
        <input type="checkbox" class="service" value="audiovisuel" /> Audiovisuel
      </label>
      <label style="margin:0 0 8px 0; font-weight:600;">
        <input type="checkbox" class="service" value="securite" /> Sécurité
      </label>
    </div>

    <label>Documents (PDF / Images / Plans)</label>
    <input id="attachments" type="file" multiple />

    <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:14px;">
      <button id="btnDraft" class="btn-secondary">Enregistrer en brouillon</button>
      <button id="btnValidate" class="btn-primary">Valider l’événement</button>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    requirePerm("CREATE_EVENT");

    const user = getUser();
    const role = user?.role;
    const allowed = (role === "organisateur" || role === "administrateur" || role === "coordonnateur");

    if (!allowed) {
      alert("Accès refusé : vous n’avez pas les droits pour créer/valider un événement.");
      window.location.href = "dashboard.html";
    }
  </script>

  <script src="events.js"></script>
</body>
</html>
