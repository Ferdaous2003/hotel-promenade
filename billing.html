<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facturation</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-dot"></span>
        <span>Hôtel La Promenade</span>
      </div>
      <div class="small" id="welcome"></div>

      <nav style="display:flex; flex-direction:column; gap:8px;">
        <a href="dashboard.html">🏠 Dashboard</a>
        <a class="active" href="billing.html">💳 Facturation</a>
      </nav>

      <div style="margin-top:14px; display:flex; gap:12px; flex-wrap:wrap;">
<button id="btnGenerate" class="btn-primary">Générer / mettre à jour</button>
<button id="btnClearInvoices" class="btn-primary">Vider factures (mock)</button>
 
</div>
 
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="title">Facturation</div>
        <div class="right">
          <span class="small" id="roleLine"></span>
        </div>
      </div>

      <div class="card">
        <h3 style="margin:0 0 10px 0;">Liste des factures</h3>
        <div class="small" style="margin-bottom:10px;">
          Changer le statut : en_attente / payee / retard.
        </div>

        <table class="table" style="width:100%;">
          <thead>
            <tr>
              <th>ID</th>
              <th>Événement</th>
              <th>salle</th>
              <th>Montant</th>
              <th>Statut</th>
              <th>Changer</th>
            </tr>
          </thead>
          <tbody id="invTbody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
<script>requirePerm("BILLING");</script>
<script src="js/billing.js"></script>
 
  <script>
    requirePerm("BILLING");
    renderWelcome();

    const user = getUser();
    const roleLine = document.getElementById("roleLine");
    if (roleLine && user) roleLine.textContent = `Rôle : ${user.role}`;
  </script>
  
</body>
</html>
