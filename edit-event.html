<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modifier un événement</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Modifier un événement</h1>

    <p>
      <a href="events-list.html">⬅ Retour à mes événements</a>
    </p>

    <div id="msg" style="margin: 10px 0;"></div>
    <div id="statusLine" class="small" style="margin: 6px 0 14px 0;"></div>

    <label>Titre de l’événement</label>
    <input id="title" type="text" />

    <label>Type</label>
    <select id="type">
      <option value="">-- Choisir --</option>
      <option value="mariage">Mariage</option>
      <option value="reunion">Réunion</option>
      <option value="seminaire">Séminaire</option>
      <option value="conference">Conférence</option>
      <option value="autre">Autre</option>
    </select>

    <label>Description (optionnel)</label>
    <textarea id="description" rows="4"></textarea>

    <label>Date & heure début</label>
    <input id="start" type="datetime-local" />

    <label>Date & heure fin</label>
    <input id="end" type="datetime-local" />

    <label>Salle souhaitée</label>
    <select id="room">
      <option value="">-- Choisir --</option>
      <option value="Salle A">Salle A</option>
      <option value="Salle B">Salle B</option>
      <option value="Salle C">Salle C</option>
      <option value="Salle D">Salle D</option>
      <option value="Salle E">Salle E</option>
    </select>

    <label>Budget prévisionnel ($)</label>
    <input id="budget" type="number" min="0" step="0.01" />

    <label>Nombre estimé de participants</label>
    <input id="participants" type="number" min="1" step="1" />

    <label>Services souhaités</label>
    <div class="card" style="padding:14px; margin-top:8px;">
      <label style="margin:0 0 8px 0; font-weight:600;">
        <input type="checkbox" class="service" value="traiteur" /> Traiteur
      </label>
      <label style="margin:0 0 8px 0; font-weight:600;">
        <input type="checkbox" class="service" value="audiovisuel" /> Audiovisuel
      </label>
      <label style="margin:0 0 8px 0; font-weight:600;">
        <input type="checkbox" class="service" value="securite" /> Sécurité
      </label>
    </div>

    <label>Documents (mock)</label>
    <div class="small" id="attachmentsList" style="margin-top:6px;"></div>

    <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:14px;">
      <button id="btnSave" class="btn-primary">Enregistrer les modifications</button>

      <button id="btnValidate" class="btn-secondary" style="display:none;">
        Valider l’événement
      </button>

      <button id="btnCancel" class="btn-secondary">Annuler l’événement</button>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    requirePerm("EDIT_EVENT", "events-list.html");
  </script>

  <script src="edit-event.js"></script>
</body>
</html>
